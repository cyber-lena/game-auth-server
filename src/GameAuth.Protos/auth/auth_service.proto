syntax = "proto3";

import "common/common.proto";

option csharp_namespace = "GameAuth.Protos.Auth";

package gameauth.auth;

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (TokenResponse);
  rpc InitiateMfaChallenge(MfaChallengeRequest) returns (MfaChallengeResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
  bool require_mfa = 3;
  string mfa_code = 4;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  string access_token = 3;
  string refresh_token = 4;
  string session_id = 5;
  bool mfa_required = 6;
  int64 expires_at_seconds = 7;
}

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
  int64 user_id = 3;
  gameauth.common.ErrorDetails error = 4;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool is_valid = 1;
  int64 user_id = 2;
  string username = 3;
  string session_id = 4;
  repeated string roles = 5;
}

message LogoutRequest {
  string access_token = 1;
  string session_id = 2;
}

message LogoutResponse {
  bool success = 1;
  string message = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message TokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at_seconds = 3;
  string token_type = 4;
}

message MfaChallengeRequest {
  string session_id = 1;
  string mfa_code = 2;
}

message MfaChallengeResponse {
  bool success = 1;
  string message = 2;
  string access_token = 3;
  string refresh_token = 4;
}
