syntax = "proto3";

import "common/common.proto";

option csharp_namespace = "GameAuth.Protos.Profile";

package gameauth.profile;

service ProfileService {
  rpc GetProfile(GetProfileRequest) returns (ProfileResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc GetSettings(GetSettingsRequest) returns (SettingsResponse);
  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse);
}

message GetProfileRequest {
  int64 user_id = 1;
}

message ProfileResponse {
  bool success = 1;
  gameauth.common.UserIdentity user = 2;
  string display_name = 3;
  string avatar_url = 4;
  int64 created_at_seconds = 5;
  int64 updated_at_seconds = 6;
  map<string, string> metadata = 7;
}

message UpdateProfileRequest {
  int64 user_id = 1;
  string display_name = 2;
  string avatar_url = 3;
  map<string, string> metadata = 4;
}

message UpdateProfileResponse {
  bool success = 1;
  string message = 2;
  gameauth.common.ErrorDetails error = 3;
}

message GetSettingsRequest {
  int64 user_id = 1;
}

message SettingsResponse {
  bool success = 1;
  map<string, string> settings = 2;
}

message UpdateSettingsRequest {
  int64 user_id = 1;
  map<string, string> settings = 2;
}

message UpdateSettingsResponse {
  bool success = 1;
  string message = 2;
}
