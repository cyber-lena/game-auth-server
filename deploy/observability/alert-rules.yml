groups:
  - name: gameauth-availability
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} target {{ $labels.instance }} has been unreachable for over 1 minute."

  - name: gameauth-http
    rules:
      - alert: HighHttpErrorRate
        expr: |
          sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])) by (job)
            /
          sum(rate(http_server_request_duration_seconds_count[5m])) by (job)
            > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} is returning more than 5% 5xx responses over the last 5 minutes."

      - alert: HighRequestLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le, job)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "95th percentile request latency for {{ $labels.job }} exceeds 1s over the last 5 minutes."
