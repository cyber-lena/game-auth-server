global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: gameauth-core
    metrics_path: /metrics
    static_configs:
      - targets: ["core:8080"]

  - job_name: gameauth-profile
    metrics_path: /metrics
    static_configs:
      - targets: ["profile:8080"]

  - job_name: gameauth-audit
    metrics_path: /metrics
    static_configs:
      - targets: ["audit:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
